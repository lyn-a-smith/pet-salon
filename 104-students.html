<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <title>Student Form</title>
</head>
<body>
    <section class="container m-5">
        <h1>Student Registration</h1>

        <form class="bg-light p-5 border rounded mt-3">

                <div class="mb-3">
                    <label class="form-label" for="">Name</label>
                    <input class="form-control" type="text" name="studentName" id="" placeholder="John Wick">
                </div>

                <div class="mb-3">
                    <label for="" class="form-label">Age</label>
                    <input class="form-control" type="number" name="studentAge" id="" placeholder="18">
                </div>

                <div class="mb-3">
                    <label class="form-label" for="">Course</label>
                    <select class="form-select" name="studentCourse" id="">
                        <option value="">Select a course</option>
                        <option value="Math">Math</option>
                        <option value="Science">Science</option>
                    </select>
                </div>

                <div class="d-flex justify-content-end gap-3">
                    <button onclick="saveStudent(event)" class="btn btn-primary" type="submit">Save</button>
                    <button class="btn btn-secondary" type="reset">Reset</button>
                </div>

            </form>
            <!-- Table -->
            <section class="container m-5">

                <h2>Student List</h2>

                <table class="table">
                    <!-- Headers -->
                     <tr>
                        <th>Name</th>
                        <th>Age</th>
                        <th>Course</th>
                        <th>Delete</th>
                     </tr>

                     <!-- Body -->
                      <tbody id="body">

                      </tbody>
                    
                </table>

            </section>

        </section>    

    <script src="./scripts/104-students.js"></script>
</body>
</html>
