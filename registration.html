<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <link rel="stylesheet" href="./styles/style.css">

    <title>Registration - Serinity Paws Pet Salon</title>
</head>

<body>
    <nav class="navbar navbar-expand-lg">
        <div class="container-fluid">
            <a class="navbar-brand" href="index.html">🐾 Serinity Paws</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" aria-current="page" href="index.html">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="registration.html">Registration</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="services.html">Services</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
    
    <main class="container mt-5 mb-5">
        
        <div class="text-center mb-5">
            <h2>Client Registration</h2>
            <p class="fs-5 text-muted">Join the Serinity Paws family and let us pamper your furry best friend.</p>
        </div>

        <div class="row">
            
            <div class="col-lg-4 mb-4">
                <div class="card shadow-sm border-0" style="border-top: 5px solid #CB997E; border-radius: 8px;">
                    <div class="card-body p-4">
                        <h3 class="h4 mb-4">Pet Details</h3>
                        <form id="petRegistrationForm">
                            <div class="mb-3">
                                <label for="petName" class="form-label text-muted fw-bold">Name</label>
                                <input type="text" class="form-control" id="petName" placeholder="e.g. Walter">
                            </div>
                            
                            <div class="mb-3">
                                <label for="petAge" class="form-label text-muted fw-bold">Age</label>
                                <input type="number" class="form-control" id="petAge" placeholder="e.g. 7">
                            </div>
                            
                            <div class="mb-3">
                                <label for="petBreed" class="form-label text-muted fw-bold">Breed</label>
                                <input type="text" class="form-control" id="petBreed" placeholder="e.g. Mixed">
                            </div>
                            
                            <div class="mb-3">
                                <label for="petGender" class="form-label text-muted fw-bold">Gender</label>
                                <select class="form-select" id="petGender">
                                    <option selected disabled>Select gender</option>
                                    <option value="Male">Male</option>
                                    <option value="Female">Female</option>
                                </select>
                            </div>
                            
                            <div class="mb-4">
                                <label for="petService" class="form-label text-muted fw-bold">Service</label>
                                <select class="form-select" id="petService">
                                    <option selected disabled>Select service</option>
                                    <option value="Bath">Bath</option>
                                    <option value="Grooming">Grooming</option>
                                    <option value="Nail Trim">Nail Trim</option>
                                </select>
                            </div>
                            
                            <div class="d-grid gap-2">
                                <button type="button" class="btn btn-primary" onclick="registerPet()">Register Pet</button>
                                <button type="reset" class="btn btn-light border">Clear Form</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>

            <div class="col-lg-8">
                <div class="card shadow-sm border-0" style="border-radius: 8px;">
                    <div class="card-body p-4">
                        <h3 class="h4 mb-4">Our Furry Guests</h3>
                        <div class="table-responsive">
                            <table class="table table-hover align-middle">
                                <thead style="background-color: #6B705C; color: #FFFFFF;">
                                    <tr>
                                        <th class="py-3">Name</th>
                                        <th class="py-3">Age</th>
                                        <th class="py-3">Gender</th>
                                        <th class="py-3">Service</th>
                                        <th class="py-3">Breed</th>
                                        <th class="py-3">Actions</th>
                                    </tr>
                                </thead>
                                <tbody id="pet-table-body">
                                    </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <script src="https://code.jquery.com/jquery-3.7.1.js" integrity="sha256-eKhayi8LEQwp4NKxN+CfCh+3qOVUtJn3QNZ0TciWLP4=" crossorigin="anonymous"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

    <script src="./scripts/registration.js"></script>
</body>

</html>
