<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

        <link rel="stylesheet" href="./styles/style.css">

    <title>Registration</title>
</head>

<body>
    <nav class="navbar navbar-expand-lg bg-body-tertiary">
        <div class="container-fluid">
            <a class="navbar-brand" href="index.html">Pet Salon</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" aria-current="page" href="index.html">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="registration.html">Registration</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="services.html">Services</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
    
    <section class="mb-5">

        
        <section class="container mt-5">

        
        <h2>Registration</h2>
        <div class="card bg-light border-1 p-4 m-4">
            <form id="petRegistrationForm">
                <div class="mb-3">
                    <label for="petName" class="form-label">Name</label>
                    <input type="text" class="form-control" id="petName" placeholder="Walter">
                </div>
                
                <div class="mb-3">
                    <label for="petAge" class="form-label">Age</label>
                    <input type="number" class="form-control" id="petAge" placeholder="7">
                </div>
                
                <div class="mb-3">
                    <label for="petBreed" class="form-label">Breed</label>
                    <input type="text" class="form-control" id="petBreed" placeholder="Mixed">
                </div>
                
                <div class="mb-3">
                    <label for="petGender" class="form-label">Gender</label>
                    <select class="form-select" id="petGender">
                        <option selected>Select gender</option>
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                    </select>
                </div>
                
                <div class="mb-3">
                    <label for="petService" class="form-label">Service</label>
                    <select class="form-select" id="petService">
                        <option selected>Select service</option>
                        <option value="Bath">Bath</option>
                        <option value="Grooming">Grooming</option>
                        <option value="Nail Trim">Nail Trim</option>
                    </select>
                </div>
                
                <div class="d-flex justify-content-end gap-2 mt-4">
                    <button type="button" class="btn btn-primary" onclick="registerPet()">Register</button>
                    <button type="reset" class="btn btn-secondary">Reset</button>
                </div>
            </form>
        </div>

                    <h2 class="fw-bold">Registered Pets</h2>
            <table class="table table-striped table-hover mt-3">
                <thead class="table-dark">
                    <tr>
                        <th>Name</th>
                        <th>Age</th>
                        <th>Gender</th>
                        <th>Service</th>
                        <th>Breed</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="pet-table-body">
                    </tbody>
            </table>
        </section>
    </section>
    



    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

    <script src="./scripts/registration.js"></script>
</body>

</html>
