<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <title>Document</title>
</head>
<body>
    <section class="container m-5">
        <h1>Product Rgistration</h1>

        <form class="bg-light p-5 border rounded mt-3">

            <div class="mb-3">
                <label class="form-label" for="">Name</label>
                <input class="form-control" type="text" name="productName" id="" placeholder="Apple">
            </div>

            <div class="mb-3">
                <label for="" class="form-label">Price</label>
                <input class="form-control" type="number" name="productPrice" id="" placeholder="4.99" step="any">
            </div>

            <div class="mb-3">
                <label class="form-label" for="">Category</label>
                <select class="form-select" name="productCategory" id="">
                    <option value="">Select a category</option>
                    <option value="fruit">Fruit</option>
                    <option value="electronic">Electronic</option>
                </select>
            </div>

            <div class="d-flex justify-content-end gap-3">
                <button onclick="saveProduct(event)" class="btn btn-primary" type="submit">Save</button>
                <button class="btn btn-secondary" type="reset">Reset</button>
            </div>

        </form>

        <div id="productsList" class="container m-5 d-flex gap-4 flex-wrap">


        </div>

        <!-- <div>
            <ol id="productList">
                <li></li>
                </ol>
        </div> -->

    </section>
    
    <script src="./scripts/104-forms.js"></script>
</body>
</html>
