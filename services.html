<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
    <link rel="stylesheet" href="./styles/style.css">
    <title>Services - Tranquility Paws Pet Salon</title>
</head>
<body>
    <nav class="navbar navbar-expand-lg sticky-top">
        <div class="container-fluid">
            <a class="navbar-brand" href="index.html">🐾 Tranquility Paws</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html"><span class="lang-en">Home</span><span class="lang-es">Inicio</span></a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="registration.html"><span class="lang-en">Registration</span><span class="lang-es">Registro</span></a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="services.html"><span class="lang-en">Services</span><span class="lang-es">Servicios</span></a>
                    </li>
                    <li class="nav-item ms-lg-3">
                        <button id="darkModeToggle" class="btn btn-outline-light btn-sm mt-1">🌙 Dark Mode</button>
                    </li>
                    <li class="nav-item ms-lg-2">
                        <button id="langToggle" class="btn btn-outline-light btn-sm mt-1">🌎 ESP</button>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container mt-5 mb-5">
        <div class="text-center mb-5">
            <h2>
                <span class="lang-en">Services Management</span>
                <span class="lang-es">Gestión de Servicios</span>
            </h2>
            <p class="fs-5 text-muted">
                <span class="lang-en">Add new grooming and spa services to our catalog.</span>
                <span class="lang-es">Añade nuevos servicios de peluquería y spa a nuestro catálogo.</span>
            </p>
        </div>

        <div class="row justify-content-center">
            <div class="col-lg-6 col-md-8">
                <div class="card shadow-sm border-0" style="border-top: 5px solid var(--accent-terracotta); border-radius: 8px;">
                    <div class="card-body p-4">
                        <h3 class="h4 mb-4">
                            <span class="lang-en">Add New Service</span>
                            <span class="lang-es">Agregar Nuevo Servicio</span>
                        </h3>
                        
                        <form id="servicesForm">
                            <div class="mb-3">
                                <label for="serviceName" class="form-label text-muted fw-bold">
                                    <span class="lang-en">Name</span><span class="lang-es">Nombre</span>
                                </label>
                                <input type="text" class="form-control" id="serviceName" placeholder="e.g. Premium Bath / ej. Baño Premium">
                            </div>
                            
                            <div class="mb-3">
                                <label for="serviceDescription" class="form-label text-muted fw-bold">
                                    <span class="lang-en">Description</span><span class="lang-es">Descripción</span>
                                </label>
                                <input type="text" class="form-control" id="serviceDescription" placeholder="e.g. Shampoo & blow dry / ej. Champú y secado">
                            </div>
                            
                            <div class="mb-4">
                                <label for="servicePrice" class="form-label text-muted fw-bold">
                                    <span class="lang-en">Price ($)</span><span class="lang-es">Precio ($)</span>
                                </label>
                                <input type="number" step="any" class="form-control" id="servicePrice" placeholder="e.g. 35.99 / ej. 35.99">
                            </div>
                            
                            <div class="d-grid gap-2">
                                <button type="submit" class="btn btn-primary">
                                    <span class="lang-en">Register Service</span><span class="lang-es">Registrar Servicio</span>
                                </button>
                                <button type="reset" class="btn btn-light border">
                                    <span class="lang-en">Clear Form</span><span class="lang-es">Borrar Formulario</span>
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://code.jquery.com/jquery-3.7.1.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
    <script src="./scripts/services.js"></script>
    <script src="./scripts/global-dark-mode.js"></script>
</body>
</html>
