<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <title>Document</title>
</head>
<body>
    
    <section class="container mt-5">
        <h1>Local Storage: Save, Get, and Delete Data.</h1>

        <form class="container mt-5 border rounded p-4">
            <div class="input-group mb-3">
                <label class="input-group-text">Username</label>
                <input class="form-control" type="text" name="" id="username" placeholder="fer123">
            </div>

            <div class="d-flex justify-content-end gap-3">
                <button id="saveBtn" class="btn btn-primary"> Save </button>
                <button id="getBtn" class="btn btn-secondary"> Get </button>
                <button id="deleteBtn" class="btn btn-danger"> Delete </button>
            </div>
        </form>

    </section>

    <script src="https://code.jquery.com/jquery-3.7.1.js" integrity="sha256-eKhayi8LEQwp4NKxN+CfCh+3qOVUtJn3QNZ0TciWLP4=" crossorigin="anonymous"></script>

    <script src="./scripts/105-local-storage.js"></script>
</body>
</html>
